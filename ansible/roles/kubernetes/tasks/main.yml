---
- name: Apply ConfigMap
  ansible.builtin.command:
    cmd: kubectl apply -f {{ playbook_dir }}/../../k8s/configmap.yaml
  register: configmap_result
  changed_when: "'configured' in configmap_result.stdout or 'created' in configmap_result.stdout"
  ignore_errors: yes

- name: Apply Secrets
  ansible.builtin.command:
    cmd: kubectl apply -f {{ playbook_dir }}/../../k8s/secrets.yaml
  register: secrets_result
  changed_when: "'configured' in secrets_result.stdout or 'created' in secrets_result.stdout"
  ignore_errors: yes

- name: Apply auth-service Deployment and Service
  ansible.builtin.shell:
    cmd: "sed 's|:latest|:{{ image_tag }}|g' {{ playbook_dir }}/../../k8s/auth-service-deployment.yaml | kubectl apply -f -"
  register: auth_deployment_result
  changed_when: "'configured' in auth_deployment_result.stdout or 'created' in auth_deployment_result.stdout"
  ignore_errors: yes

- name: Apply app-service Deployment
  ansible.builtin.shell:
    cmd: "sed 's|:latest|:{{ image_tag }}|g' {{ playbook_dir }}/../../k8s/deployment.yaml | kubectl apply -f -"
  register: app_deployment_result
  changed_when: "'configured' in app_deployment_result.stdout or 'created' in app_deployment_result.stdout"
  ignore_errors: yes

- name: Apply app-service Service
  ansible.builtin.command:
    cmd: kubectl apply -f {{ playbook_dir }}/../../k8s/service.yaml
  register: service_result
  changed_when: "'configured' in service_result.stdout or 'created' in service_result.stdout"
  ignore_errors: yes

- name: Apply api-gateway Deployment and Service
  ansible.builtin.shell:
    cmd: "sed 's|:latest|:{{ image_tag }}|g' {{ playbook_dir }}/../../k8s/api-gateway-deployment.yaml | kubectl apply -f -"
  register: gateway_deployment_result
  changed_when: "'configured' in gateway_deployment_result.stdout or 'created' in gateway_deployment_result.stdout"
  ignore_errors: yes

- name: Apply HPA
  ansible.builtin.command:
    cmd: kubectl apply -f {{ playbook_dir }}/../../k8s/hpa.yaml
  register: hpa_result
  changed_when: "'configured' in hpa_result.stdout or 'created' in hpa_result.stdout"
  ignore_errors: yes

- name: Apply Ingress
  ansible.builtin.command:
    cmd: kubectl apply -f {{ playbook_dir }}/../../k8s/ingress.yaml
  register: ingress_result
  changed_when: "'configured' in ingress_result.stdout or 'created' in ingress_result.stdout"
  ignore_errors: yes

- name: Apply ELK Stack
  ansible.builtin.command:
    cmd: kubectl apply -f {{ playbook_dir }}/../../k8s/elk-stack.yaml
  register: elk_result
  changed_when: "'configured' in elk_result.stdout or 'created' in elk_result.stdout"
  ignore_errors: yes

- name: Apply Filebeat DaemonSet
  ansible.builtin.command:
    cmd: kubectl apply -f {{ playbook_dir }}/../../k8s/filebeat.yaml
  register: filebeat_result
  changed_when: "'configured' in filebeat_result.stdout or 'created' in filebeat_result.stdout"
  ignore_errors: yes

- name: Verify pods
  ansible.builtin.command:
    cmd: kubectl get pods
  register: pods_output
  changed_when: false
  ignore_errors: yes

- name: Show pods
  ansible.builtin.debug:
    var: pods_output.stdout_lines

- name: Verify services
  ansible.builtin.command:
    cmd: kubectl get services
  register: services_output
  changed_when: false
  ignore_errors: yes

- name: Show services
  ansible.builtin.debug:
    var: services_output.stdout_lines

- name: Verify HPA
  ansible.builtin.command:
    cmd: kubectl get hpa
  register: hpa_output
  changed_when: false
  ignore_errors: yes

- name: Show HPA
  ansible.builtin.debug:
    var: hpa_output.stdout_lines
