---
# Role: mysql
# Ensures MySQL is running and the stockportfolio database/user exist

- name: Force remove all service containers before redeploy
  shell: |
    docker rm -f auth-service || true
    docker rm -f app-service || true
    docker rm -f api-gateway || true
    docker rm -f stockportfolio-mysql || true
  ignore_errors: yes

- name: Create Docker network if not exists
  shell: docker network create stockportfolio-network || true
  ignore_errors: yes

- name: Pull MySQL image
  shell: docker pull mysql:8.0

- name: Force remove existing MySQL container (if running)
  shell: docker rm -f stockportfolio-mysql || true
  ignore_errors: yes

- name: Start MySQL container on stockportfolio-network
  shell: |
    docker run -d \
      --name stockportfolio-mysql \
      --network stockportfolio-network \
      --network-alias mysql \
      --restart unless-stopped \
      -e MYSQL_ROOT_PASSWORD="rootpassword" \
      -e MYSQL_DATABASE="stockportfolio" \
      -e MYSQL_USER="{{ db_username }}" \
      -e MYSQL_PASSWORD="{{ db_password }}" \
      -p 3306:3306 \
      -v mysql_data:/var/lib/mysql \
      mysql:8.0

- name: Wait for MySQL to be healthy
  wait_for:
    port: 3306
    host: localhost
    delay: 10
    timeout: 60
