---
# Role: app_server
# Pulls the latest Docker image and restarts the Spring Boot app container

- name: Force remove existing app container (if running)
  shell: docker rm -f stockportfolio-app || true
  ignore_errors: yes

- name: Pull latest Docker image
  shell: docker pull 3piradians/stock-portfolio-manager:{{ image_tag }}

- name: Start Spring Boot app container
  shell: |
    docker run -d \
      --name stockportfolio-app \
      --restart on-failure \
      --network stockportfolio-network \
      -e DB_USERNAME="{{ db_username }}" \
      -e DB_PASSWORD="{{ db_password }}" \
      -e JWT_SECRET="{{ jwt_secret }}" \
      -e FINNHUB_API_KEY="{{ finnhub_api_key }}" \
      -e SPRING_DATASOURCE_URL="jdbc:mysql://mysql:3306/stockportfolio" \
      -p 8081:8081 \
      -v app_logs:/app/logs \
      3piradians/stock-portfolio-manager:{{ image_tag }}

- name: Wait for app to be healthy
  uri:
    url: "http://localhost:8081/auth/login"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 10
  delay: 10
