---
# Role: app_server
# Pulls the latest Docker image and restarts the Spring Boot app container

- name: Force remove existing app container (if running)
  shell: docker rm -f stock-portfolio-manager || true
  ignore_errors: yes

- name: Start Spring Boot app container
  community.docker.docker_container:
    name: stockportfolio-app
    image: "3piradians/stock-portfolio-manager:{{ image_tag }}"
    state: started
    restart_policy: on-failure
    env:
      DB_USERNAME: "{{ db_username }}"
      DB_PASSWORD: "{{ db_password }}"
      JWT_SECRET: "{{ jwt_secret }}"
      FINNHUB_API_KEY: "{{ finnhub_api_key }}"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/stockportfolio"
    ports:
      - "8081:8081"
    links:
      - "stockportfolio-mysql:mysql"
    volumes:
      - app_logs:/app/logs

- name: Wait for app to be healthy
  uri:
    url: "http://localhost:8081/auth/login"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 10
  delay: 10
