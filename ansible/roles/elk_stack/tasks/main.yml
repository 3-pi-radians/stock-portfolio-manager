---
- name: Create ELK network if not exists
  shell: docker network create elk_network || true
  ignore_errors: yes

- name: Force remove existing ELK containers
  shell: |
    docker rm -f stockportfolio-elasticsearch || true
    docker rm -f stockportfolio-logstash || true
    docker rm -f stockportfolio-kibana || true
  ignore_errors: yes

- name: Start Elasticsearch
  shell: |
    docker run -d \
      --name stockportfolio-elasticsearch \
      --restart unless-stopped \
      --network elk_network \
      --network-alias elasticsearch \
      -e discovery.type=single-node \
      -e xpack.security.enabled=false \
      -e ES_JAVA_OPTS="-Xms512m -Xmx512m" \
      -p 9200:9200 \
      -v es_data:/usr/share/elasticsearch/data \
      docker.elastic.co/elasticsearch/elasticsearch:8.13.0

- name: Wait for Elasticsearch to be ready
  uri:
    url: "http://localhost:9200/_cluster/health"
    status_code: 200
  register: es_health
  until: es_health.status == 200
  retries: 15
  delay: 10

- name: Start Logstash
  shell: |
    docker run -d \
      --name stockportfolio-logstash \
      --restart unless-stopped \
      --network elk_network \
      -p 5044:5044 \
      -p 5000:5000/udp \
      -v {{ playbook_dir }}/../../logstash/pipeline:/usr/share/logstash/pipeline:ro \
      -v auth_logs:/app/logs/auth-service:ro \
      -v app_logs:/app/logs/app-service:ro \
      -v gateway_logs:/app/logs/api-gateway:ro \
      docker.elastic.co/logstash/logstash:8.13.0

- name: Start Kibana
  shell: |
    docker run -d \
      --name stockportfolio-kibana \
      --restart unless-stopped \
      --network elk_network \
      -e ELASTICSEARCH_HOSTS=http://elasticsearch:9200 \
      -p 5601:5601 \
      docker.elastic.co/kibana/kibana:8.13.0

- name: Wait for Kibana to be ready
  uri:
    url: "http://localhost:5601/api/status"
    status_code: 200
  register: kibana_health
  until: kibana_health.status == 200
  retries: 15
  delay: 10
