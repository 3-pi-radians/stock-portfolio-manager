apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-service
  namespace: default
  labels:
    app: app-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-service
  template:
    metadata:
      labels:
        app: app-service
    spec:
      containers:
        - name: app-service
          image: 3piradians/app-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: stockportfolio-config
                  key: SPRING_DATASOURCE_URL
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: stockportfolio-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: stockportfolio-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: stockportfolio-config
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: stockportfolio-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stockportfolio-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: stockportfolio-secrets
                  key: JWT_SECRET
            - name: FINNHUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stockportfolio-secrets
                  key: FINNHUB_API_KEY
          livenessProbe:
            httpGet:
              path: /portfolio
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /portfolio
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
