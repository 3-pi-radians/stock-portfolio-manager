apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockportfolio-app
  namespace: default
  labels:
    app: stockportfolio-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stockportfolio-app
  template:
    metadata:
      labels:
        app: stockportfolio-app
    spec:
      containers:
        - name: stockportfolio-app
          image: 3piradians/stock-portfolio-manager:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: stockportfolio-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: stockportfolio-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: stockportfolio-config
                  key: DB_NAME
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: stockportfolio-config
                  key: SERVER_PORT
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: stockportfolio-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stockportfolio-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: stockportfolio-secrets
                  key: JWT_SECRET
            - name: FINNHUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stockportfolio-secrets
                  key: FINNHUB_API_KEY
          livenessProbe:
            httpGet:
              path: /auth/login
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /auth/login
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
