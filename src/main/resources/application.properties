# Server
server.port=8082
spring.application.name=app-service

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:stockportfolio}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false

# JWT (validation only — tokens are issued by auth-service)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Finnhub
finnhub.api.key=${FINNHUB_API_KEY}
finnhub.base.url=https://finnhub.io/api/v1

# Logging
logging.file.name=/app/logs/app-service.log
logging.level.com.stockportfolio=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
