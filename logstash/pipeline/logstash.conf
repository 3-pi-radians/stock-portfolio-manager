input {
  file {
    path => "/app/logs/auth-service/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain { charset => "UTF-8" }
    tags => ["auth-service"]
  }
  file {
    path => "/app/logs/app-service/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain { charset => "UTF-8" }
    tags => ["app-service"]
  }
  file {
    path => "/app/logs/api-gateway/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain { charset => "UTF-8" }
    tags => ["api-gateway"]
  }
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => plain
    tags => ["tcp"]
  }
}

filter {
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:logger} - %{GREEDYDATA:log_message}"
    }
    overwrite => ["message"]
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  if [level] == "ERROR" {
    mutate { add_tag => ["error"] }
  }
  if [level] == "WARN" {
    mutate { add_tag => ["warning"] }
  }

  if "auth-service" in [tags] {
    mutate { add_field => { "service" => "auth-service" } }
  }
  if "app-service" in [tags] {
    mutate { add_field => { "service" => "app-service" } }
  }
  if "api-gateway" in [tags] {
    mutate { add_field => { "service" => "api-gateway" } }
  }

  if [logger] =~ "AuthService" or [logger] =~ "AuthController" {
    mutate { add_tag => ["auth_activity"] }
  }
  if [logger] =~ "HoldingService" {
    mutate { add_tag => ["holding_activity"] }
  }
  if [logger] =~ "MarketService" {
    mutate { add_tag => ["market_activity"] }
  }
  if [logger] =~ "PortfolioService" {
    mutate { add_tag => ["portfolio_activity"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "stockportfolio-logs-%{+YYYY.MM.dd}"
  }
}
