server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/auth/**
        - id: static-resources
          uri: ${APP_SERVICE_URL:http://app-service:8082}
          predicates:
            - Path=/css/**
        - id: app-service
          uri: ${APP_SERVICE_URL:http://app-service:8082}
          predicates:
            - Path=/**

jwt:
  secret: ${JWT_SECRET}

logging:
  file:
    name: /app/logs/api-gateway.log
  level:
    com.stockportfolio: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
