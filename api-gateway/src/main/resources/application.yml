server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/auth/**
          filters:
            # Preserve the original client Host header so Spring MVC in auth-service
            # builds redirect URLs using the gateway host (e.g. localhost:8202)
            # instead of the internal Docker hostname (auth-service:8081).
            - PreserveHostHeader
            # Safety net: rewrite any leaked internal hostname in Location headers
            # to a root-relative path so browsers always redirect through the gateway.
            - RewriteResponseHeader=Location, ^https?://[^/]+(/.*)$, $\1
        - id: static-resources
          uri: ${APP_SERVICE_URL:http://app-service:8082}
          predicates:
            - Path=/css/**
          filters:
            - PreserveHostHeader
            - RewriteResponseHeader=Location, ^https?://[^/]+(/.*)$, $\1
        - id: app-service
          uri: ${APP_SERVICE_URL:http://app-service:8082}
          predicates:
            - Path=/**
          filters:
            # Preserve the original client Host header so Spring MVC in app-service
            # builds redirect URLs using the gateway host (e.g. localhost:8202)
            # instead of the internal Docker hostname (app-service:8082).
            - PreserveHostHeader
            # Safety net: rewrite any leaked internal hostname in Location headers
            # to a root-relative path so browsers always redirect through the gateway.
            - RewriteResponseHeader=Location, ^https?://[^/]+(/.*)$, $\1

jwt:
  secret: ${JWT_SECRET}

logging:
  file:
    name: /app/logs/api-gateway.log
  level:
    com.stockportfolio: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
